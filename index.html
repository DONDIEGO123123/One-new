<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>שוק יד שנייה · Second Hand Marketplace</title>
<meta name="description" content="מוצרי יד שנייה איכותיים במחירים מעולים · Quality used products at great prices" />
<meta property="og:type" content="website" />
<meta property="og:title" content="שוק יד שנייה · Second Hand Marketplace" />
<meta property="og:description" content="מוצרי יד שנייה איכותיים במחירים מעולים." />
<meta property="og:image" content="https://picsum.photos/seed/ogcover/1200/630" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{--bg:#0B0B0B;--bg2:#151515;--green:#00E676;--green-d:#00C853;--white:#FFFFFF;--gray:#BDBDBD;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
html,body{background:var(--bg);color:var(--white);font-family:'Rubik','Cairo',system-ui,sans-serif;overflow-x:hidden;}
a{text-decoration:none;color:inherit;} button{font-family:inherit;cursor:pointer;} img{display:block;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-weight:600;font-size:15px;border:none;border-radius:14px;padding:14px 26px;transition:all .28s cubic-bezier(.2,.7,.3,1);}
.btn:focus-visible{outline:2px solid var(--green);outline-offset:3px;}
.btn-primary{background:linear-gradient(135deg,var(--green),var(--green-d));color:#062a15;box-shadow:0 10px 30px rgba(0,230,118,.35);}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 16px 42px rgba(0,230,118,.55);}
.pulse{animation:pulse 2.6s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 10px 30px rgba(0,230,118,.35);}50%{box-shadow:0 10px 30px rgba(0,230,118,.35),0 0 0 12px rgba(0,230,118,0);}}
.btn-ghost{background:rgba(255,255,255,.04);color:#fff;border:1px solid rgba(0,230,118,.35);}
.btn-ghost:hover{transform:translateY(-3px);border-color:var(--green);box-shadow:0 12px 34px rgba(0,230,118,.25);}
.btn-tg{background:linear-gradient(135deg,var(--green),var(--green-d));color:#062a15;box-shadow:0 6px 18px rgba(0,230,118,.3);}
.btn-tg:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,230,118,.5);}
.btn-wa{background:rgba(255,255,255,.03);color:#fff;border:1px solid var(--green);}
.btn-wa:hover{transform:translateY(-2px);background:rgba(0,230,118,.08);box-shadow:0 10px 26px rgba(0,230,118,.25);}
.btn.disabled{opacity:.45;cursor:not-allowed;pointer-events:none;filter:grayscale(.35);}

/* preloader */
#preloader{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:radial-gradient(circle at 50% 40%,#0e130f,#0B0B0B);transition:opacity .6s ease;}
#preloader.hide{opacity:0;pointer-events:none;}
.pl-logo{display:flex;align-items:center;gap:12px;font-weight:800;font-size:30px;letter-spacing:.5px;animation:plpop .7s ease both;}
.pl-logo .logo-dot{width:16px;height:16px;animation:pulsebrand 1.6s ease-in-out infinite;}
@keyframes plpop{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
@keyframes pulsebrand{0%,100%{box-shadow:0 0 14px var(--green);}50%{box-shadow:0 0 30px var(--green),0 0 60px rgba(0,230,118,.5);}}
.pl-bar{width:180px;height:3px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden;}
.pl-bar::after{content:"";display:block;height:100%;width:40%;background:linear-gradient(90deg,transparent,var(--green),transparent);animation:plslide 1.1s linear infinite;}
@keyframes plslide{from{transform:translateX(-120%);}to{transform:translateX(320%);}}

.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 20px;background:rgba(11,11,11,.72);backdrop-filter:blur(14px);border-bottom:1px solid rgba(0,230,118,.12);transition:box-shadow .3s,background .3s;}
.topbar.scrolled{box-shadow:0 10px 30px rgba(0,0,0,.5);background:rgba(11,11,11,.9);}
.logo{display:inline-flex;align-items:center;gap:10px;font-weight:800;font-size:20px;letter-spacing:.4px;}
.logo-dot{width:11px;height:11px;border-radius:50%;background:var(--green);box-shadow:0 0 14px var(--green);}
.top-right{display:flex;align-items:center;gap:8px;}
.langs{display:flex;gap:4px;background:rgba(255,255,255,.05);padding:4px;border-radius:12px;}
.lang{border:none;background:transparent;color:var(--gray);font-weight:600;font-size:13px;padding:6px 11px;border-radius:9px;transition:all .2s;}
.lang:hover{color:#fff;} .lang.active{background:linear-gradient(135deg,var(--green),var(--green-d));color:#062a15;}
.owner-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--gray);font-weight:600;font-size:13px;padding:8px 14px;border-radius:11px;transition:all .2s;}
.owner-btn:hover{color:#fff;border-color:var(--green);} .owner-btn.live{color:var(--green);border-color:rgba(0,230,118,.5);}
#settingsBtn{display:none;padding:8px 12px;font-size:15px;}

.hero{position:relative;padding:96px 20px 84px;text-align:center;overflow:hidden;background:radial-gradient(120% 90% at 50% -10%,rgba(0,230,118,.14),transparent 60%),linear-gradient(180deg,#0B0B0B 0%,#0e130f 55%,#0B0B0B 100%);}
.hero-glow{position:absolute;top:-140px;left:50%;transform:translateX(-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(0,230,118,.22),transparent 62%);filter:blur(30px);pointer-events:none;}
.particles{position:absolute;inset:0;pointer-events:none;}
.particle{position:absolute;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:float linear infinite;}
@keyframes float{0%{transform:translateY(0) translateX(0);}50%{transform:translateY(-26px) translateX(12px);}100%{transform:translateY(0) translateX(0);}}
.hero-inner{position:relative;z-index:2;max-width:820px;margin:0 auto;animation:fadeUp .8s ease both;}
.hero-title{font-size:clamp(32px,7vw,60px);font-weight:800;line-height:1.08;margin-bottom:14px;background:linear-gradient(180deg,#fff,#cfe9d8);-webkit-background-clip:text;background-clip:text;color:transparent;}
.hero-sub{color:var(--gray);font-size:clamp(15px,2.4vw,20px);font-weight:400;margin-bottom:34px;}
.hero-cta{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}

/* stats */
.stats{max-width:1000px;margin:0 auto;padding:8px 20px 8px;}
.stats-inner{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.stat{background:linear-gradient(180deg,rgba(21,21,21,.9),rgba(13,13,13,.9));border:1px solid rgba(0,230,118,.16);border-radius:20px;padding:22px 14px;text-align:center;}
.stat-emoji{font-size:26px;} .stat-value{font-size:clamp(22px,4vw,32px);font-weight:800;color:var(--green);margin:6px 0 2px;text-shadow:0 0 18px rgba(0,230,118,.35);}
.stat-label{font-size:13px;color:var(--gray);}
@media(max-width:560px){.stats-inner{grid-template-columns:1fr;} .stat{padding:16px;}}

.section{max-width:1280px;margin:0 auto;padding:44px 20px 40px;}
.shelf-block{max-width:1280px;margin:0 auto;padding:14px 20px 0;}
.shelf-head{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;margin:18px 0 14px;}
.shelf{display:flex;gap:16px;overflow-x:auto;padding-bottom:10px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
.shelf::-webkit-scrollbar{height:6px;} .shelf::-webkit-scrollbar-thumb{background:rgba(0,230,118,.3);border-radius:6px;}
.shelf .card{min-width:270px;max-width:270px;scroll-snap-align:start;}

.controls{display:flex;flex-direction:column;gap:20px;margin-bottom:30px;}
.search{position:relative;max-width:560px;width:100%;margin:0 auto;}
.search input{width:100%;padding:16px 50px;font-family:inherit;font-size:16px;color:#fff;background:rgba(21,21,21,.8);border:1px solid rgba(255,255,255,.08);border-radius:16px;backdrop-filter:blur(10px);transition:border-color .25s,box-shadow .25s;}
.search input::placeholder{color:#7d7d7d;}
.search input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 4px rgba(0,230,118,.12);}
.search svg{position:absolute;top:50%;transform:translateY(-50%);color:var(--green);pointer-events:none;}
html[dir="rtl"] .search svg{right:18px;} html[dir="ltr"] .search svg{left:18px;}
.filters{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.chip{font-weight:500;font-size:14px;color:var(--gray);padding:9px 18px;border-radius:999px;background:rgba(21,21,21,.7);border:1px solid rgba(255,255,255,.08);transition:all .25s;}
.chip:hover{color:#fff;border-color:rgba(0,230,118,.4);}
.chip.active{color:#062a15;background:linear-gradient(135deg,var(--green),var(--green-d));border-color:transparent;box-shadow:0 6px 20px rgba(0,230,118,.35);font-weight:600;}

.grid{display:grid;gap:24px;grid-template-columns:repeat(1,1fr);}
@media(min-width:640px){.grid{grid-template-columns:repeat(2,1fr);}}
@media(min-width:1024px){.grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:1280px){.grid{grid-template-columns:repeat(4,1fr);}}
.card{position:relative;background:linear-gradient(180deg,rgba(21,21,21,.92),rgba(13,13,13,.92));border:1px solid rgba(0,230,118,.18);border-radius:22px;padding:16px;backdrop-filter:blur(12px);box-shadow:0 12px 34px rgba(0,0,0,.55);display:flex;flex-direction:column;animation:fadeUp .6s ease both;transition:transform .25s cubic-bezier(.2,.7,.3,1),box-shadow .35s,border-color .35s;transform-style:preserve-3d;}
.card:hover{border-color:rgba(0,230,118,.6);box-shadow:0 26px 60px rgba(0,0,0,.6),0 0 34px rgba(0,230,118,.28);}
.card.sold-out{opacity:.72;}
.card-media{position:relative;border-radius:16px;overflow:hidden;aspect-ratio:7/5;background:#0e130f;cursor:zoom-in;}
.card-media img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.card-media video{width:100%;height:100%;object-fit:cover;background:#000;}
.card:hover .card-media img{transform:scale(1.05);}
.media-frame{width:100%;height:100%;}
.badge{position:absolute;top:12px;font-size:12px;font-weight:600;color:#062a15;background:linear-gradient(135deg,var(--green),var(--green-d));padding:6px 12px;border-radius:999px;box-shadow:0 4px 14px rgba(0,230,118,.4);z-index:3;}
html[dir="rtl"] .badge{right:12px;} html[dir="ltr"] .badge{left:12px;}
.status-rib{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:4;pointer-events:none;}
.status-rib span{background:rgba(0,0,0,.66);border:2px solid var(--green);color:#fff;font-weight:800;font-size:20px;letter-spacing:2px;padding:8px 22px;border-radius:12px;transform:rotate(-8deg);}
.status-rib.sold span{border-color:#ff6b6b;color:#ff9b9b;}
.img-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:5;width:34px;height:34px;border-radius:50%;border:none;background:rgba(0,0,0,.55);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;}
.img-nav.prev{left:8px;} .img-nav.next{right:8px;}
.dots{position:absolute;bottom:8px;left:0;right:0;display:flex;gap:5px;justify-content:center;z-index:5;}
.dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);} .dots i.on{background:var(--green);}
.card-body{padding:14px 6px 4px;display:flex;flex-direction:column;flex:1;}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.tag{font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:999px;background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.3);}
.card-title{font-size:19px;font-weight:700;margin-bottom:6px;}
.card-loc{font-size:12.5px;color:var(--gray);margin-bottom:8px;}
.card-desc{font-size:14px;line-height:1.5;color:var(--gray);margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-price{font-size:26px;font-weight:800;color:var(--green);margin:auto 0 14px;text-shadow:0 0 18px rgba(0,230,118,.4);}
.card-actions{display:flex;flex-direction:column;gap:10px;}
.card-actions .btn{width:100%;}
.admin-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.admin-row .btn{flex:1;min-width:60px;padding:9px;font-size:12.5px;border-radius:10px;}
.btn-edit{background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.15);}
.btn-dup{background:rgba(0,230,118,.08);color:var(--green);border:1px solid rgba(0,230,118,.3);}
.btn-del{background:rgba(255,80,80,.08);color:#ff8a8a;border:1px solid rgba(255,80,80,.3);}
.btn-move{background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(255,255,255,.12);flex:0 0 auto;min-width:42px;}
.draft-mark{position:absolute;top:12px;z-index:3;font-size:11px;font-weight:700;background:#444;color:#fff;padding:5px 10px;border-radius:999px;}
html[dir="rtl"] .draft-mark{left:12px;} html[dir="ltr"] .draft-mark{right:12px;}

.empty{text-align:center;padding:70px 20px;color:var(--gray);display:flex;flex-direction:column;align-items:center;gap:18px;}

.footer{margin-top:40px;background:linear-gradient(180deg,#0B0B0B,#0e130f);border-top:1px solid rgba(0,230,118,.15);padding:52px 20px 90px;}
.footer-inner{max-width:640px;margin:0 auto;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;}
.footer-text{color:var(--gray);font-size:15px;line-height:1.6;max-width:460px;}
.footer-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.channel-btn{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.4);color:var(--green);border-radius:14px;padding:12px 22px;font-weight:600;display:inline-flex;gap:8px;align-items:center;}
.copyright{color:#6f6f6f;font-size:13px;margin-top:8px;}

.fab{position:fixed;bottom:22px;z-index:46;display:none;align-items:center;gap:8px;background:linear-gradient(135deg,var(--green),var(--green-d));color:#062a15;font-weight:700;font-size:15px;border:none;border-radius:16px;padding:15px 22px;box-shadow:0 12px 34px rgba(0,230,118,.45);}
html[dir="rtl"] .fab{left:22px;} html[dir="ltr"] .fab{right:22px;}
.fab.show{display:inline-flex;} .fab:hover{transform:translateY(-3px);}
#toTop{position:fixed;bottom:90px;z-index:46;width:46px;height:46px;border-radius:50%;border:1px solid rgba(0,230,118,.4);background:rgba(21,21,21,.9);color:var(--green);font-size:20px;display:none;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.5);}
html[dir="rtl"] #toTop{left:22px;} html[dir="ltr"] #toTop{right:22px;}
#toTop.show{display:flex;}

#mobileBar{position:fixed;bottom:0;left:0;right:0;z-index:44;display:none;gap:10px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:rgba(11,11,11,.92);backdrop-filter:blur(14px);border-top:1px solid rgba(0,230,118,.2);}
#mobileBar .btn{flex:1;padding:13px;border-radius:13px;}
@media(max-width:640px){#mobileBar{display:flex;}}

.banner{display:none;text-align:center;font-size:13.5px;color:#0b2a18;font-weight:600;background:linear-gradient(90deg,#ffd84d,#ffe98a);padding:9px 16px;}
.banner.show{display:block;}

.overlay{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:18px;}
.overlay.show{display:flex;}
.modal{width:100%;max-width:480px;max-height:90vh;overflow-y:auto;background:var(--bg2);border:1px solid rgba(0,230,118,.25);border-radius:22px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.7);animation:fadeUp .3s ease both;}
.modal h2{font-size:21px;font-weight:700;margin-bottom:18px;}
.field{margin-bottom:14px;} .field label{display:block;font-size:13px;color:var(--gray);margin-bottom:6px;font-weight:500;}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;font-family:inherit;font-size:15px;color:#fff;background:rgba(11,11,11,.7);border:1px solid rgba(255,255,255,.1);border-radius:12px;}
.field textarea{resize:vertical;min-height:60px;} .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green);}
.field select option{background:#151515;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.lang-tabs{display:flex;gap:6px;margin-bottom:14px;}
.lang-tabs button{flex:1;padding:9px;border-radius:11px;border:1px solid rgba(255,255,255,.1);background:rgba(11,11,11,.6);color:var(--gray);font-weight:600;font-size:13px;}
.lang-tabs button.active{background:linear-gradient(135deg,var(--green),var(--green-d));color:#062a15;border-color:transparent;}
.langpane,.sectpane{display:none;} .langpane.active,.sectpane.active{display:block;}
.tagpick{display:flex;flex-wrap:wrap;gap:8px;}
.tagopt{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#fff;background:rgba(11,11,11,.7);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:8px 10px;}
.cat-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;align-items:center;}
.cat-row input{flex:1 1 68px;}
.cat-row input{padding:10px;font-size:13px;color:#fff;background:rgba(11,11,11,.7);border:1px solid rgba(255,255,255,.1);border-radius:10px;}
.cat-row input:focus{outline:none;border-color:var(--green);}
.cat-del{background:rgba(255,80,80,.1);color:#ff8a8a;border:1px solid rgba(255,80,80,.3);border-radius:10px;width:38px;height:38px;font-size:15px;}
.add-cat{width:100%;margin-top:6px;background:rgba(0,230,118,.08);color:var(--green);border:1px dashed rgba(0,230,118,.4);border-radius:12px;padding:11px;font-weight:600;font-size:14px;}
.stat-row{display:grid;grid-template-columns:52px 1fr;gap:8px;margin-bottom:10px;}
.stat-row .labels{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:6px;}
.stat-row input{padding:10px;font-size:13px;color:#fff;background:rgba(11,11,11,.7);border:1px solid rgba(255,255,255,.1);border-radius:10px;}
.modal-actions{display:flex;gap:10px;margin-top:20px;} .modal-actions .btn{flex:1;}
.err{color:#ff8a8a;font-size:13px;margin-top:10px;text-align:center;min-height:16px;}

/* lightbox */
.lb{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.92);display:none;padding:16px;overflow-y:auto;}
.lb.show{display:block;}
.lb-x{position:fixed;top:14px;z-index:82;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:20px;}
html[dir="rtl"] .lb-x{left:14px;} html[dir="ltr"] .lb-x{right:14px;}
.lb-inner{max-width:1000px;margin:40px auto;display:grid;grid-template-columns:1.3fr 1fr;gap:24px;}
@media(max-width:800px){.lb-inner{grid-template-columns:1fr;}}
.lb-stage{position:relative;border-radius:18px;overflow:hidden;background:#000;aspect-ratio:4/3;}
.lb-stage img{width:100%;height:100%;object-fit:contain;transition:transform .3s;cursor:zoom-in;}
.lb-stage img.zoom{transform:scale(1.9);cursor:zoom-out;}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:3;width:44px;height:44px;border-radius:50%;border:none;background:rgba(0,0,0,.55);color:#fff;font-size:20px;}
.lb-nav.prev{left:10px;} .lb-nav.next{right:10px;}
.lb-info h3{font-size:24px;font-weight:800;margin-bottom:8px;}
.lb-price{font-size:30px;font-weight:800;color:var(--green);margin:10px 0;text-shadow:0 0 18px rgba(0,230,118,.4);}
.lb-desc{color:var(--gray);line-height:1.6;margin-bottom:14px;}
.lb-thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.lb-thumbs img{width:56px;height:56px;object-fit:cover;border-radius:9px;border:2px solid transparent;cursor:pointer;}
.lb-thumbs img.on{border-color:var(--green);}
.lb-stage video{width:100%;height:100%;object-fit:contain;background:#000;}
.lb-vthumb{width:56px;height:56px;border-radius:9px;border:2px solid transparent;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;}
.lb-vthumb.on{border-color:var(--green);}
.lb-related{margin-top:24px;} .lb-related h4{font-size:15px;color:var(--gray);margin-bottom:10px;}
.lb-rel-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;}
.lb-rel-row .rel{min-width:120px;cursor:pointer;}
.lb-rel-row .rel img{width:120px;height:90px;object-fit:cover;border-radius:10px;}
.lb-rel-row .rel span{font-size:12px;color:var(--gray);display:block;margin-top:4px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}

function contactBtn(type){
  const url = type==="tg" ? (CONFIG.GROUPS&&CONFIG.GROUPS.telegram) : (CONFIG.GROUPS&&CONFIG.GROUPS.whatsapp);
  const cls = type==="tg" ? "btn-tg" : "btn-wa";
  const icon = type==="tg" ? tgSvg() : waSvg();
  const label = type==="tg" ? t("contact_tg") : t("contact_wa");
  if(url && String(url).trim()){
    return `<a class="btn ${cls}" target="_blank" rel="noopener" href="${esc(url)}">${icon} ${esc(label)}</a>`;
  }
  return `<span class="btn ${cls} disabled" role="button" aria-disabled="true">${icon} ${esc(t("link_unavailable"))}</span>`;
}

function defaultCategories(){ return ["electronics","furniture","gaming","home","accessories","vehicles"].map(k=>({key:k,label:{he:DICT.he[k],en:DICT.en[k],ru:DICT.ru[k],ar:DICT.ar[k]}})); }
function defaultStats(){ return [
  {emoji:"📦",value:"3,200",label:{he:"מוצרים פורסמו",en:"Products listed",ru:"Товаров размещено"}},
  {emoji:"🤝",value:"2,800",label:{he:"עסקאות הושלמו",en:"Deals completed",ru:"Сделок завершено"}},
  {emoji:"⭐",value:"4.9/5",label:{he:"דירוג ממוצע",en:"Average rating",ru:"Средний рейтинг"}} ]; }
function categories(){ return Array.isArray(settings.categories)?settings.categories:[]; }
function catLabel(key){ if(key==="all") return t("all"); const c=categories().find(x=>x.key===key); return c?(c.label[lang]||c.label.he||c.label.en||c.label.ru||c.label.ar||key):key; }
function siteText(key){ const o=settings.texts&&settings.texts[key]; if(o){const v=o[lang]||o.he||o.en||o.ru||o.ar; if(v) return v;} return t(key); }
function brandName(){ return (settings.texts&&settings.texts.brand)?settings.texts.brand:"ReMarket"; }
function normalizeSettings(d){ const s={texts:(d&&d.texts)||{},categories:(d&&Array.isArray(d.categories))?d.categories:[],stats:(d&&Array.isArray(d.stats))?d.stats:[]};
  if(!s.categories.length) s.categories=defaultCategories(); if(!s.stats.length) s.stats=defaultStats(); return s; }

const _mem={};
const safeStorage={ getItem:k=>{try{return localStorage.getItem(k)}catch{return _mem[k]??null}}, setItem:(k,v)=>{try{localStorage.setItem(k,v)}catch{_mem[k]=v}}, removeItem:k=>{try{localStorage.removeItem(k)}catch{delete _mem[k]}} };
function getRV(){ try{ return JSON.parse(safeStorage.getItem("rv")||"[]"); }catch{ return []; } }
function pushRV(id){ let a=getRV().filter(x=>String(x)!==String(id)); a.unshift(id); a=a.slice(0,12); safeStorage.setItem("rv",JSON.stringify(a)); }

/* ============================== SUPABASE ============================== */
async function initSupabase(){
  if(!CONFIG.SUPABASE_URL||!CONFIG.SUPABASE_ANON_KEY){ demoMode=true; products=DEMO.map(p=>({...p})); settings=normalizeSettings(null); return; }
  demoMode=false;
  sb=supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY,{auth:{storage:safeStorage,persistSession:true,autoRefreshToken:true}});
  const {data:{session:s}}=await sb.auth.getSession(); session=s;
  await fetchSettings(); await fetchProducts();
  sb.channel("products-rt").on("postgres_changes",{event:"*",schema:"public",table:"products"},fetchProducts).subscribe();
  sb.channel("settings-rt").on("postgres_changes",{event:"*",schema:"public",table:"settings"},async()=>{await fetchSettings();renderChrome();renderStats();renderShelves();renderGrid();}).subscribe();
  sb.auth.onAuthStateChange((_e,s2)=>{session=s2;renderChrome();renderShelves();renderGrid();});
}
async function fetchProducts(){ if(demoMode) return; const {data,error}=await sb.from("products").select("*").order("sort",{ascending:true}).order("created_at",{ascending:true}); if(error){console.error(error);return;} products=data||[]; renderShelves(); renderGrid(); }
async function fetchSettings(){ if(demoMode) return; const {data,error}=await sb.from("settings").select("data").eq("id",1).maybeSingle(); if(error){console.error(error);return;} settings=normalizeSettings(data&&data.data); }
async function saveProduct(p){
  const payload={price:p.price,category:p.category,condition:p.condition,status:p.status,location:p.location,tags:p.tags,images:p.images,image:(p.images&&p.images[0])||"",telegram:p.telegram,whatsapp:p.whatsapp,title:p.title,description:p.description};
  if(demoMode){ if(p.id){products=products.map(x=>x.id===p.id?{...x,...payload}:x);} else {payload.id="tmp"+Date.now();payload.sort=Date.now();payload.created_at=new Date().toISOString();products.push(payload);} products.sort((a,b)=>(a.sort||0)-(b.sort||0)); renderShelves(); renderGrid(); return; }
  if(p.id){ const {error}=await sb.from("products").update(payload).eq("id",p.id); if(error) throw error; }
  else { const {error}=await sb.from("products").insert({...payload,sort:Date.now()}); if(error) throw error; }
  await fetchProducts();
}
async function removeProduct(id){ if(demoMode){products=products.filter(x=>x.id!==id);renderShelves();renderGrid();return;} const{error}=await sb.from("products").delete().eq("id",id);if(error)throw error; await fetchProducts(); }
async function saveSettings(){ if(demoMode){renderChrome();renderStats();renderShelves();renderGrid();return;} const{error}=await sb.from("settings").upsert({id:1,data:settings});if(error)throw error; await fetchSettings(); }
async function moveProduct(id,dir){
  const i=products.findIndex(p=>String(p.id)===String(id)); const j=dir<0?i-1:i+1; if(i<0||j<0||j>=products.length) return;
  const a=products[i], b=products[j]; const tmp=a.sort; a.sort=b.sort; b.sort=tmp;
  if(demoMode){ products.sort((x,y)=>(x.sort||0)-(y.sort||0)); renderGrid(); return; }
  try{ await sb.from("products").update({sort:a.sort}).eq("id",a.id); await sb.from("products").update({sort:b.sort}).eq("id",b.id); await fetchProducts(); }catch(e){ alert(e.message||e); }
}
async function duplicateProduct(id){ const p=products.find(x=>String(x.id)===String(id)); if(!p) return; const copy={...p}; delete copy.id; delete copy.created_at; copy.status="draft"; await saveProduct(copy); }

function renderStats(){
  const box=document.getElementById("stats"); const st=(settings.stats||[]).filter(s=>s&&s.value);
  if(!st.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="stats-inner">${st.map(s=>`<div class="stat"><div class="stat-emoji">${esc(s.emoji||"")}</div>
    <div class="stat-value" data-count="${esc(s.value)}">${/^[\d,]+$/.test(s.value)?"0":esc(s.value)}</div>
    <div class="stat-label">${esc((s.label&&(s.label[lang]||s.label.he))||"")}</div></div>`).join("")}</div>`;
  observeStats();
}
let statsObserved=false;
function observeStats(){
  const el=document.getElementById("stats"); if(!el||!("IntersectionObserver"in window)){ runCountUp(); return; }
  const io=new IntersectionObserver((ents)=>{ ents.forEach(e=>{ if(e.isIntersecting){ runCountUp(); io.disconnect(); } }); },{threshold:.3});
  io.observe(el);
}
function runCountUp(){
  document.querySelectorAll("#stats [data-count]").forEach(el=>{
    const target=el.getAttribute("data-count"); if(!/^[\d,]+$/.test(target)){ el.textContent=target; return; }
    const n=parseInt(target.replace(/,/g,""),10); let cur=0; const inc=Math.max(1,n/45);
    const timer=setInterval(()=>{ cur+=inc; if(cur>=n){cur=n;clearInterval(timer);} el.textContent=Math.round(cur).toLocaleString(); },18);
  });
}

function tagPills(p){ const arr=tagsOf(p); if(!arr.length) return ""; return `<div class="tags">${arr.map(k=>{const tg=TAGS.find(x=>x.key===k); return tg?`<span class="tag">${tg.emoji} ${esc(tg.label[lang]||tg.label.he)}</span>`:"";}).join("")}</div>`; }

function cardHTML(p, opts={}){
  const admin = opts.admin && isOwner();
  const imgs=imagesOf(p); const multi=imgs.length>1 && !opts.compact;
  const src=primaryImg(p);
  const status=p.status||"available";
  const ribbon = (status==="sold"||status==="reserved") ? `<div class="status-rib ${status}"><span>${esc(t(status))}</span></div>` : "";
  const draft = (status==="draft") ? `<span class="draft-mark">${esc(t("draft"))}</span>` : "";
  const nav = multi ? `<button class="img-nav prev" data-imgnav="-1">‹</button><button class="img-nav next" data-imgnav="1">›</button>
     <div class="dots">${imgs.map((_,i)=>`<i class="${i===0?'on':''}"></i>`).join("")}</div>` : "";
  const showContact = status!=="sold";
  let adminRow="";
  if(admin){
    const reorder = (activeCat==="all"&&!query&&!opts.compact) ? `<button class="btn btn-move" data-up="${p.id}">⬆</button><button class="btn btn-move" data-down="${p.id}">⬇</button>` : "";
    adminRow=`<div class="admin-row">
      <button class="btn btn-edit" data-edit="${p.id}">✎ ${esc(t("edit"))}</button>
      <button class="btn btn-dup" data-dup="${p.id}">⧉ ${esc(t("duplicate"))}</button>
      <button class="btn btn-del" data-del="${p.id}">🗑</button>${reorder}</div>`;
  }
  return `<article class="card ${status==='sold'?'sold-out':''}" data-id="${esc(p.id)}">
    <div class="card-media" data-idx="0" data-imgs='${esc(JSON.stringify(imgs))}'>
      <div class="media-frame">${mediaElHTML(src,p.id)}</div>
      <span class="badge">${esc(t(p.condition))}</span>${draft}${ribbon}${nav}
    </div>
    <div class="card-body">
      ${tagPills(p)}
      <h3 class="card-title">${esc(pick(p.title))}</h3>
      ${p.location?`<div class="card-loc">📍 ${esc(p.location)}</div>`:""}
      <p class="card-desc">${esc(pick(p.description))}</p>
      <div class="card-price">₪${Number(p.price||0).toLocaleString()}</div>
      ${adminRow}
      ${showContact?`<div class="card-actions">
        ${contactBtn("tg")}
        ${contactBtn("wa")}
      </div>`:""}
    </div></article>`;
}

function visibleProducts(){ return products.filter(p=> isOwner() || (p.status||"available")!=="draft" ); }

function renderShelves(){
  const box=document.getElementById("shelves"); const vis=visibleProducts();
  const notSold=vis.filter(p=>(p.status||"available")!=="sold");
  const news=[...notSold].sort((a,b)=> new Date(b.created_at||0)-new Date(a.created_at||0)).slice(0,10);
  const hot=notSold.filter(p=>tagsOf(p).includes("hot")).slice(0,10);
  const rv=getRV().map(id=>products.find(p=>String(p.id)===String(id))).filter(Boolean).filter(p=>isOwner()||(p.status||"available")!=="draft").slice(0,10);
  const shelf=(title,icon,list)=> list.length? `<div class="shelf-head">${icon} ${esc(title)}</div><div class="shelf">${list.map(p=>cardHTML(p,{compact:true})).join("")}</div>`:"";
  box.innerHTML = shelf(t("new_title"),"🆕",news) + shelf(t("hot_title"),"🔥",hot) + shelf(t("recent_title"),"👀",rv);
}

function renderGrid(){
  const q=query.trim().toLowerCase();
  const list=visibleProducts().filter(p=>{ const catOk=activeCat==="all"||p.category===activeCat; const hay=(pick(p.title)+" "+pick(p.description)+" "+catLabel(p.category)+" "+(p.location||"")).toLowerCase(); return catOk&&(!q||hay.includes(q)); });
  const grid=document.getElementById("grid");
  if(!list.length){ grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><p>${esc(t("empty"))}</p><button class="btn btn-ghost" id="resetBtn">${esc(t("reset"))}</button></div>`;
    const r=document.getElementById("resetBtn"); if(r) r.onclick=()=>{activeCat="all";query="";document.getElementById("search").value="";renderChrome();renderGrid();}; return; }
  grid.innerHTML=list.map(p=>cardHTML(p,{admin:true})).join("");
  [...grid.querySelectorAll(".card")].forEach((c,i)=>c.style.animationDelay=(i*60)+"ms");
}

const lb=document.getElementById("lightbox"), lbInner=document.getElementById("lbInner");
function openLightbox(id,idx){ const p=products.find(x=>String(x.id)===String(id)); if(!p) return; lbState={id,idx:idx||0}; pushRV(id); renderShelves(); renderLightbox(); lb.classList.add("show"); }
function closeLightbox(){ lb.classList.remove("show"); lbInner.innerHTML=""; }
function renderLightbox(){
  const p=products.find(x=>String(x.id)===String(lbState.id)); if(!p) return;
  const imgs=imagesOf(p); if(!imgs.length) imgs.push(primaryImg(p));
  if(lbState.idx>=imgs.length) lbState.idx=0;
  const related=visibleProducts().filter(x=>x.category===p.category && String(x.id)!==String(p.id) && (x.status||"available")!=="sold").slice(0,8);
  const showContact=(p.status||"available")!=="sold";
  lbInner.innerHTML=`
    <div>
      <div class="lb-stage">
        ${isVideo(imgs[lbState.idx])
          ? `<video src="${esc(imgs[lbState.idx])}" controls playsinline></video>`
          : `<img id="lbImg" src="${esc(imgs[lbState.idx])}" alt="${esc(pick(p.title))}"/>`}
        ${imgs.length>1?`<button class="lb-nav prev" data-lbnav="-1">‹</button><button class="lb-nav next" data-lbnav="1">›</button>`:""}
      </div>
      ${imgs.length>1?`<div class="lb-thumbs">${imgs.map((im,i)=> isVideo(im)
        ? `<div class="lb-vthumb ${i===lbState.idx?'on':''}" data-lbthumb="${i}">▶</div>`
        : `<img data-lbthumb="${i}" class="${i===lbState.idx?'on':''}" src="${esc(im)}"/>`).join("")}</div>`:""}
    </div>
    <div class="lb-info">
      ${tagPills(p)}
      <h3>${esc(pick(p.title))}</h3>
      ${p.location?`<div class="card-loc">📍 ${esc(p.location)}</div>`:""}
      <span class="badge" style="position:static;display:inline-block">${esc(t(p.condition))}</span>
      <div class="lb-price">₪${Number(p.price||0).toLocaleString()}</div>
      <p class="lb-desc">${esc(pick(p.description))}</p>
      ${showContact?`<div class="card-actions">
        ${contactBtn("tg")}
        ${contactBtn("wa")}</div>`
      :`<div class="status-rib ${p.status}" style="position:static"><span>${esc(t(p.status))}</span></div>`}
      ${related.length?`<div class="lb-related"><h4>${esc(t("related_title"))}</h4><div class="lb-rel-row">${related.map(r=>`<div class="rel" data-rel="${esc(r.id)}"><img src="${esc(primaryImg(r))}"/><span>${esc(pick(r.title))} · ₪${Number(r.price||0).toLocaleString()}</span></div>`).join("")}</div></div>`:""}

    <div class="field"><label>${esc(t("tags_label"))}</label><div class="tagpick">${TAGS.map(tg=>`<label class="tagopt"><input type="checkbox" data-tag="${tg.key}" ${(p.tags||[]).includes(tg.key)?'checked':''}/> ${tg.emoji} ${esc(tg.label[lang]||tg.label.he)}</label>`).join("")}</div></div>
    <div class="err" id="ed-err"></div>
    <div class="modal-actions"><button class="btn btn-ghost" id="ed-cancel">${esc(t("cancel"))}</button><button class="btn btn-primary" id="ed-save">${esc(t("save"))}</button></div>`;
  overlay.classList.add("show");
  modal.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{ modal.querySelectorAll("[data-tab]").forEach(x=>x.classList.toggle("active",x===b)); modal.querySelectorAll("[data-pane]").forEach(x=>x.classList.toggle("active",x.dataset.pane===b.dataset.tab)); });
  document.getElementById("ed-cancel").onclick=closeModal;
  const upBtn=document.getElementById("ed-upload"), fileInput=document.getElementById("ed-file"), upStatus=document.getElementById("ed-upstatus");
  upBtn.onclick=()=>fileInput.click();
  fileInput.onchange=async()=>{
    if(!fileInput.files||!fileInput.files.length) return;
    if(demoMode){ upStatus.style.color="#ff8a8a"; upStatus.textContent=t("upload_need_supabase"); return; }
    upStatus.style.color="var(--gray)"; upBtn.disabled=true;
    const total=fileInput.files.length; let done=0;
    try{
      for(const file of fileInput.files){
        upStatus.textContent=t("uploading")+" ("+(done+1)+"/"+total+")";
        const [url]=await uploadFiles([file]);
        const ta=document.getElementById("ed-imgs"); ta.value=(ta.value.trim()?ta.value.trim()+"\n":"")+url;
        done++;
      }
      upStatus.textContent="✓ "+done+"/"+total;
    }catch(e){ upStatus.style.color="#ff8a8a"; upStatus.textContent=String(e.message||e); }
    finally{ upBtn.disabled=false; fileInput.value=""; }
  };
  document.getElementById("ed-save").onclick=async()=>{
    const title={},description={}; LANGS.forEach(l=>{title[l]=modal.querySelector(`[data-title="${l}"]`).value.trim();description[l]=modal.querySelector(`[data-desc="${l}"]`).value.trim();});
    const images=document.getElementById("ed-imgs").value.split("\n").map(s=>s.trim()).filter(Boolean);
    const tags=[...modal.querySelectorAll("[data-tag]:checked")].map(e=>e.dataset.tag);
    const out={id:p.id,price:Number(document.getElementById("ed-price").value)||0,category:document.getElementById("ed-cat").value,condition:document.getElementById("ed-cond").value,
      status:document.getElementById("ed-status").value,images,location:document.getElementById("ed-loc").value.trim(),tags,
      telegram:"",whatsapp:"",title,description};
    if(!title.he&&!title.en&&!title.ru){document.getElementById("ed-err").textContent=t("title_label")+" ✗";return;}
    try{await saveProduct(out);closeModal();}catch(e){document.getElementById("ed-err").textContent=String(e.message||e);}
  };
}

function openSettings(){
  const txt=k=>(settings.texts&&settings.texts[k])||{};
  const textLangPane=l=>`<div class="langpane ${l==='he'?'active':''}" data-tpane="${l}">
      ${EDITABLE_TEXTS.map(k=>`<div class="field"><label>${esc(t('lbl_'+k))} (${DICT[l].label})</label>
        ${(k==='footer_text'||k==='wa_template')?`<textarea data-text="${k}" data-tl="${l}">${esc(txt(k)[l]||"")}</textarea>`:`<input data-text="${k}" data-tl="${l}" value="${esc(txt(k)[l]||"")}"/>`}</div>`).join("")}</div>`;
  const catRow=c=>`<div class="cat-row" data-key="${esc(c.key||"")}">
      ${LANGS.map(l=>`<input data-clabel="${l}" placeholder="${DICT[l].label}" value="${esc(c.label&&c.label[l]||"")}"/>`).join("")}
      <button class="cat-del" type="button">✕</button></div>`;
  const statsArr=(settings.stats&&settings.stats.length?settings.stats:defaultStats()); while(statsArr.length<3) statsArr.push({emoji:"",value:"",label:{}});
  const statRow=(s,i)=>`<div class="stat-row" data-si="${i}"><input data-semoji placeholder="🎯" value="${esc(s.emoji||"")}"/>
      <div><input data-svalue placeholder="${esc(t("stat_value"))}" value="${esc(s.value||"")}"/>
      <div class="labels">${LANGS.map(l=>`<input data-slabel="${l}" placeholder="${DICT[l].label}" value="${esc(s.label&&s.label[l]||"")}"/>`).join("")}</div></div></div>`;
  modal.innerHTML=`<h2>${esc(t("settings_title"))}</h2>
    <div class="lang-tabs">
      <button data-sect="texts" class="active">${esc(t("sect_texts"))}</button>
      <button data-sect="cats">${esc(t("sect_cats"))}</button>
      <button data-sect="stats">${esc(t("sect_stats"))}</button></div>
    <div class="sectpane active" data-sectpane="texts">
      <div class="field"><label>${esc(t("brand_label"))}</label><input id="st-brand" value="${esc(brandName())}"/></div>
      <div class="field"><label>${esc(t("channel_label"))}</label><input id="st-channel" value="${esc(settings.texts&&settings.texts.telegram_channel||"")}" placeholder="https://t.me/..."/></div>
      <div class="lang-tabs">${LANGS.map(l=>`<button data-ttab="${l}" class="${l==='he'?'active':''}">${DICT[l].label}</button>`).join("")}</div>
      ${LANGS.map(textLangPane).join("")}</div>
    <div class="sectpane" data-sectpane="cats"><div id="catRows">${categories().map(catRow).join("")}</div><button class="add-cat" id="addCat" type="button">＋ ${esc(t("add_category"))}</button></div>
    <div class="sectpane" data-sectpane="stats">${statsArr.slice(0,3).map(statRow).join("")}</div>
    <div class="err" id="st-err"></div>
    <div class="modal-actions"><button class="btn btn-ghost" id="st-cancel">${esc(t("cancel"))}</button><button class="btn btn-primary" id="st-save">${esc(t("save"))}</button></div>`;
  overlay.classList.add("show");
  modal.querySelectorAll("[data-sect]").forEach(b=>b.onclick=()=>{ modal.querySelectorAll("[data-sect]").forEach(x=>x.classList.toggle("active",x===b)); modal.querySelectorAll("[data-sectpane]").forEach(x=>x.classList.toggle("active",x.dataset.sectpane===b.dataset.sect)); });
  modal.querySelectorAll("[data-ttab]").forEach(b=>b.onclick=()=>{ modal.querySelectorAll("[data-ttab]").forEach(x=>x.classList.toggle("active",x===b)); modal.querySelectorAll("[data-tpane]").forEach(x=>x.classList.toggle("active",x.dataset.tpane===b.dataset.ttab)); });
  document.getElementById("addCat").onclick=()=>{ const div=document.createElement("div"); div.innerHTML=catRow({key:"",label:{}}); const row=div.firstElementChild; document.getElementById("catRows").appendChild(row); row.querySelector(".cat-del").onclick=()=>row.remove(); };
  modal.querySelectorAll(".cat-del").forEach(b=>b.onclick=()=>b.closest(".cat-row").remove());
  document.getElementById("st-cancel").onclick=closeModal;
  document.getElementById("st-save").onclick=async()=>{
    const texts={brand:document.getElementById("st-brand").value.trim(), telegram_channel:document.getElementById("st-channel").value.trim()};
    EDITABLE_TEXTS.forEach(k=>{ const o={}; LANGS.forEach(l=>{const el=modal.querySelector(`[data-text="${k}"][data-tl="${l}"]`); o[l]=el?el.value.trim():"";}); texts[k]=o; });
    const cats=[...modal.querySelectorAll(".cat-row")].map(r=>{const label={};LANGS.forEach(l=>label[l]=r.querySelector(`[data-clabel="${l}"]`).value.trim()); return {key:r.dataset.key||("c"+Math.random().toString(36).slice(2,7)),label};}).filter(c=>c.label.he||c.label.en||c.label.ru);
    const stats=[...modal.querySelectorAll(".stat-row")].map(r=>{const label={};LANGS.forEach(l=>label[l]=r.querySelector(`[data-slabel="${l}"]`).value.trim()); return {emoji:r.querySelector("[data-semoji]").value.trim(),value:r.querySelector("[data-svalue]").value.trim(),label};}).filter(s=>s.value);
    settings.texts=texts; settings.categories=cats.length?cats:defaultCategories(); settings.stats=stats;
    try{ await saveSettings(); closeModal(); renderChrome(); renderStats(); renderShelves(); renderGrid(); }catch(e){ document.getElementById("st-err").textContent=String(e.message||e); }
  };
}

function handleCardArea(container){
  container.addEventListener("click",async e=>{
    const card=e.target.closest(".card"); 
    const edit=e.target.closest("[data-edit]"), del=e.target.closest("[data-del]"), dup=e.target.closest("[data-dup]"), up=e.target.closest("[data-up]"), down=e.target.closest("[data-down]"), nav=e.target.closest("[data-imgnav]"), img=e.target.closest(".card-img");
    if(edit){const p=products.find(x=>String(x.id)===edit.dataset.edit);if(p)openEditor(p);return;}
    if(dup){await duplicateProduct(dup.dataset.dup);return;}
    if(up){await moveProduct(up.dataset.up,-1);return;}
    if(down){await moveProduct(down.dataset.down,1);return;}
    if(del){if(confirm(t("confirm_del"))){try{await removeProduct(del.dataset.del);}catch(err){alert(err.message||err);}}return;}
    if(nav && card){ const media=card.querySelector(".card-media"); let imgs=[]; try{imgs=JSON.parse(media.dataset.imgs||"[]");}catch{} if(imgs.length>1){ let idx=(+media.dataset.idx||0)+(+nav.dataset.imgnav); idx=(idx+imgs.length)%imgs.length; media.dataset.idx=idx; media.querySelector(".media-frame").innerHTML=mediaElHTML(imgs[idx],card.dataset.id); media.querySelectorAll(".dots i").forEach((d,i)=>d.classList.toggle("on",i===idx)); } return; }
    if(img && card){ const media=card.querySelector(".card-media"); openLightbox(card.dataset.id, +media.dataset.idx||0); }
  });
}
handleCardArea(document.getElementById("grid"));
handleCardArea(document.getElementById("shelves"));

document.getElementById("lbClose").addEventListener("click",closeLightbox);
lb.addEventListener("click",e=>{ if(e.target===lb) closeLightbox();
  const nav=e.target.closest("[data-lbnav]"), thumb=e.target.closest("[data-lbthumb]"), rel=e.target.closest("[data-rel]"), img=e.target.closest("#lbImg");
  const p=products.find(x=>String(x.id)===String(lbState.id)); if(!p) return; const imgs=imagesOf(p);
  if(nav){ lbState.idx=(lbState.idx+ (+nav.dataset.lbnav) + imgs.length)%imgs.length; renderLightbox(); return; }
  if(thumb){ lbState.idx=+thumb.dataset.lbthumb; renderLightbox(); return; }
  if(rel){ openLightbox(rel.dataset.rel,0); return; }
  if(img){ img.classList.toggle("zoom"); }
});

/* scroll UI */
const topbar=document.getElementById("topbar"), toTop=document.getElementById("toTop");
window.addEventListener("scroll",()=>{ const y=window.scrollY; topbar.classList.toggle("scrolled",y>10); toTop.classList.toggle("show",y>500); },{passive:true});
toTop.addEventListener("click",()=>window.scrollTo({top:0,behavior:"smooth"}));

/* desktop card tilt */
if(window.matchMedia && window.matchMedia("(hover:hover) and (pointer:fine)").matches && !window.matchMedia("(prefers-reduced-motion:reduce)").matches){
  document.addEventListener("pointermove",e=>{ const card=e.target.closest(".card"); if(!card){return;} const r=card.getBoundingClientRect(); const px=(e.clientX-r.left)/r.width-0.5, py=(e.clientY-r.top)/r.height-0.5; card.style.transform=`translateY(-6px) rotateX(${(-py*5).toFixed(2)}deg) rotateY(${(px*5).toFixed(2)}deg)`; });
  document.addEventListener("pointerleave",e=>{ const card=e.target&&e.target.closest&&e.target.closest(".card"); if(card) card.style.transform=""; },true);
  document.addEventListener("pointerout",e=>{ const from=e.target.closest&&e.target.closest(".card"); const to=e.relatedTarget&&e.relatedTarget.closest&&e.relatedTarget.closest(".card"); if(from&&from!==to) from.style.transform=""; });
}

/* ============================== BACKGROUND MUSIC ============================== */
const bgm=document.getElementById("bgm"), musicBtn=document.getElementById("musicBtn");
function setMusicUI(playing){ musicBtn.textContent=playing?"🔊":"🔇"; }
function initMusic(){
  if(!CONFIG.MUSIC || !CONFIG.MUSIC.url){ musicBtn.style.display="none"; return; }
  musicBtn.style.display="inline-flex";
  bgm.src=CONFIG.MUSIC.url; bgm.loop=true; bgm.volume=(CONFIG.MUSIC.volume!=null?CONFIG.MUSIC.volume:0.4);
  setMusicUI(false);
  const tryPlay=()=>bgm.play().then(()=>setMusicUI(true)).catch(()=>{});
  tryPlay(); // browsers usually block autoplay-with-sound → will start on first tap
  const kick=(e)=>{ if(e&&e.target&&e.target.closest&&e.target.closest("#musicBtn")) return; if(bgm.paused) tryPlay(); document.removeEventListener("pointerdown",kick); };
  document.addEventListener("pointerdown",kick);
  musicBtn.onclick=()=>{ if(bgm.paused){ bgm.play().then(()=>setMusicUI(true)).catch(()=>{}); } else { bgm.pause(); setMusicUI(false); } };
}

(async function(){
  renderParticles();
  await initSupabase();
  renderChrome(); renderStats(); renderShelves(); renderGrid();
  initMusic();
  const pl=document.getElementById("preloader"); setTimeout(()=>{ pl.classList.add("hide"); setTimeout(()=>pl.remove(),700); }, 500);
})();
